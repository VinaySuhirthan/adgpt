services:
  - type: web
    name: adgpt
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -w 4 -k uvicorn.workers.UvicornWorker question_mode.appbc:app --bind 0.0.0.0:$PORT
    envVars:
      - key: BRAIN
        value: "False"
      - key: GROQ_ENABLED
        value: "true"
      - key: GROQ_MODEL
        value: "llama-3.1-8b-instant"
      - key: PYTHON_VERSION
        value: 3.10.0
